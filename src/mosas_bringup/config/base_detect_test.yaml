/green_dot_detect_node:
  ros__parameters:
    # ==========================================
    # 0. 基础设置
    # ==========================================
    # 调试模式：True 会显示 OpenCV 窗口和终端详细日志
    debug_mode: true
    # 自动保存：检测到目标后是否保存图片到 ~/saved_green_dots
    save_images: false

    # ==========================================
    # 1. 核心检测参数 (RAW Domain)
    # ==========================================
    detect:
      # --- 亮度筛选 ---
      # 绿色通道的亮度下限 (0-255)
      # 25m 外的灯虽然小，但通常很亮（自发光）。
      # 如果环境很黑，可以设高一点(100)来滤除背景；如果环境亮，保持 50-80。
      v_low: 210

      # --- 光谱纯度筛选 (最关键) ---
      # 绿/红 比率 (Green / Red)
      # 真正的 LED 绿灯，G 分量通常是 R 的 2~4 倍以上。白光通常在 1.0 左右。
      # 建议从 2.0 开始调，如果干扰多就加到 3.0
      min_gr_ratio: 3.0
      
      # 绿/蓝 比率 (Green / Blue)
      # 同样，绿灯的 G 远大于 B。
      min_gb_ratio: 0.8

      # --- 空间搜索条带 ---
      # 最小搜索带高度 (像素)。
      # 防止计算出的 ROI 太窄导致漏检。
      search_strip_min_h: 100

    # ==========================================
    # 2. 形态与几何筛选参数
    # ==========================================
      # --- 面积筛选 (Pixel Area) ---
      # 注意：这里指的是全分辨率下的像素面积。
      min_area: 3000.0
      max_area: 17000.0

      # --- 长宽比筛选 (Width / Height) ---
      # 理论上圆是 1.0。但小目标受像素切割影响，可能变成 1x2 或 2x1。
      min_aspect_ratio: 0.4
      max_aspect_ratio: 2.5

      # --- 圆形度筛选 ---
      # 越接近 1.0 越圆。
      # 对于 <5 像素的目标，形状可能是“十”字或“田”字，圆度很差。
      # 必须调低，否则会漏掉远处的灯。
      min_circularity: 0.2

    # ==========================================
    # 3. 物理场景参数 (用于 ROI 预测)
    # ==========================================
      # 单位：米 (m)
      camera_height: 0.0
      target_height: 0.0  # mm

      # 搜索角度范围 (度)
      detect_scale: 20.0

      # 目标距离 (单位：毫米 mm )
      distance: 900.0
      
      # 角度补偿 (度)
      # 如果发现测出来的 Yaw 总是偏左或偏右固定值，在这里修正
      pix_offset: 0.0

    # ==========================================
    # 4. 相机内参 (Camera Intrinsic)
    # ==========================================
    camera:
      # 相机矩阵 K [fx, 0, cx, 0, fy, cy, 0, 0, 1]
      matrix: [1410.2285, 0.0, 701.9679, 0.0, 1407.8337, 563.2716, 0.0, 0.0, 1.0]
      # 畸变系数 D [k1, k2, p1, p2, k3]
      dist_coeffs: [0.395119251615162, 0.213199304321145, 0.0, 0.0, 0.0]